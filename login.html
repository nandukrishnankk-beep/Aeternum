<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Aeternum Innovate</title>
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <main class="center-message">
      <div class="center-card">
        <h1>Admin Login</h1>
        <form id="login-form" class="form-grid">
          <input id="login-email" class="input" type="email" placeholder="Email" required />
          <input id="login-password" class="input" type="password" placeholder="Password" required />
          <button type="submit" class="btn btn-primary">Sign In</button>
          <div id="login-feedback" class="small" style="display:none;margin-top:10px;"></div>
        </form>
      </div>
    </main>
    <script src="assets/admin.js"></script>
  </body>
</html>
